name: PR Preview (robust)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # --- 基本情報ログ ---
      - name: Debug event
        run: |
          echo "EVENT: ${{ github.event.action }}"
          echo "PR NUMBER: ${{ github.event.number }}"
          echo "REPO: ${{ github.repository }}"

      # --- デプロイ開始コメント ---
      - name: Comment start
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr,
              body: `Deploy started for PR #${pr}...`
            });

      # --- ファイル準備（安全コピー） ---
      - name: Prepare files
        if: github.event.action != 'closed'
        run: |
          mkdir out
          rsync -av --exclude=out --exclude=.git --exclude=.github ./ out/

      # --- コピー結果確認 ---
      - name: Verify files
        if: github.event.action != 'closed'
        run: |
          echo "=== ROOT FILES ==="
          ls -R
          echo "=== OUT FILES ==="
          ls -R out

      # --- index.htmlチェック ---
      - name: Check index.html
        if: github.event.action != 'closed'
        run: |
          if [ ! -f out/index.html ]; then
            echo "ERROR: index.html not found in out/"
            exit 1
          fi

      # --- デプロイ ---
      - name: Deploy to gh-pages
        if: github.event.action != 'closed'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: pr-${{ github.event.number }}

      # --- デプロイ後ログ ---
      - name: Post-deploy info
        if: github.event.action != 'closed'
        run: |
          echo "Deployed to pr-${{ github.event.number }}"

      # --- URLコメント ---
      - name: Comment preview URL
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${pr}/`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr,
              body: `Preview ready:\n${url}`
            });

      # =============================
      # PR CLOSED → CLEANUP
      # =============================

      - name: Checkout gh-pages
        if: github.event.action == 'closed'
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview
        if: github.event.action == 'closed'
        run: |
          echo "Removing pr-${{ github.event.number }}"
          rm -rf pr-${{ github.event.number }}

      - name: Commit & push cleanup
        if: github.event.action == 'closed'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Remove preview for PR #${{ github.event.number }}" || echo "No changes"
          git push
